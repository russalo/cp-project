name: Decisions Sync

on:
  workflow_dispatch:
  schedule:
    # 02:00 UTC daily (typically evening in US time zones)
    - cron: "0 2 * * *"
  push:
    branches: [main]
    paths:
      - DECISIONS.md
      - MILESTONES.md
      - scripts/sync_decisions.py
      - scripts/sync_milestones.py
      - .github/workflows/decisions-sync.yml

permissions:
  contents: write
  issues: write

jobs:
  sync-decisions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync decision issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/sync_decisions.py \
            --decisions-file DECISIONS.md \
            --todo-file DECISIONS-TODO.md \
            --sync-github

      - name: Sync milestones TODO
        run: |
          python3 scripts/sync_milestones.py \
            --milestones-file MILESTONES.md \
            --todo-file MILESTONES-TODO.md

      - name: Commit refreshed TODO files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DECISIONS-TODO.md MILESTONES-TODO.md
          if git diff --cached --quiet; then
            echo "No TODO updates to commit"
            exit 0
          fi
          git commit -m "chore(sync): refresh decisions and milestones TODO files"
          git push

