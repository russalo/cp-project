name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cp_project
          POSTGRES_USER: cp_project_user
          POSTGRES_PASSWORD: cp_project_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cp_project_user -d cp_project"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: cp_project
      DB_USER: cp_project_user
      DB_PASSWORD: cp_project_password
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Django checks
        working-directory: backend
        run: |
          python manage.py check
          python manage.py migrate --noinput

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint and build frontend
        working-directory: frontend
        run: |
          pnpm run lint
          pnpm run build
